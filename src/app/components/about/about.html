<div class="min-h-screen bg-linear-to-br from-slate-50 to-slate-200 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden transform transition-all hover:shadow-2xl duration-300">
    <div class="bg-linear-to-r from-blue-600 to-blue-500 px-6 py-10 text-center relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9IiNmZmYiLz48L3N2Zz4=')]"></div>
      
      <div class="relative z-10">
        <div class="mx-auto h-24 w-24 bg-white rounded-full flex items-center justify-center shadow-lg mb-4 ring-4 ring-blue-400 ring-opacity-50">
          <img src="images/logomoph.png" width="80" height="80" alt="กระทรวงสาธารณสุข" priority />
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight drop-shadow-sm">เกี่ยวกับระบบ</h1>
      </div>
    </div>
    
    <div class="p-8">
      <div class="text-center space-y-6">
        <div>
          <h2 class="text-2xl font-bold text-gray-800 mb-2">{{ appConfig.appName }}</h2>
          <p class="text-gray-600 leading-relaxed text-lg">
            {{ appConfig.appDescription }}
          </p>
        </div>
        
        <div class="pt-6 border-t border-gray-100">
          <div class="grid grid-cols-2 gap-4 text-center">
            <div class="p-3 bg-gray-50 rounded-lg">
              <span class="text-xs text-gray-500 tracking-wide font-semibold mb-1 flex items-center justify-center gap-1">
                <pk-icon iconSet="google" name="deployed_code"></pk-icon>
                AppVersion
              </span>
              <span class="block text-lg font-mono text-blue-600 font-bold">{{ appConfig.version }}</span>
            </div>
            <div class="p-3 bg-gray-50 rounded-lg">
              <span class="text-xs text-gray-500 tracking-wide font-semibold mb-1 flex items-center justify-center gap-1">
                <pk-icon iconSet="google" name="font_download"></pk-icon>
                Angular Version
              </span>
              <span class="block text-lg font-mono text-gray-600 font-bold">{{ version }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
